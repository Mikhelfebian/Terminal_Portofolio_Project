# ─── Production Nginx Config for terminal-bio ───
# Deploy to: /etc/nginx/sites-available/terminal-bio
# Enable:    ln -s /etc/nginx/sites-available/terminal-bio /etc/nginx/sites-enabled/

upstream api_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # ── SSL (install with certbot) ──
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Web root — ONLY the compiled frontend ──
    root /var/www/terminal-bio/dist;
    index index.html;

    # ── Security headers ──
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Static assets (content-hashed, cache forever) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon / icons ──
    location ~* \.(svg|ico)$ {
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── API proxy → Express backend ──
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Rate limiting: 100 req/min per IP
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        # Block large uploads beyond 1 MB
        client_max_body_size 1m;

        access_log /var/log/nginx/terminal-bio-api.log;
    }

    # ── Block sensitive paths (return 404 to avoid information leak) ──
    location ~* (\.env|\.git|\.env\.example|node_modules|composer\.json|package-lock\.json|README\.md) {
        deny all;
        return 404;
    }

    # ── SPA fallback: all other routes serve index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/terminal-bio-access.log;
    error_log  /var/log/nginx/terminal-bio-error.log warn;
}

# ── Rate limit zone (shared across all server blocks) ──
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
